name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Use pre-built dist-production
        run: |
          mkdir -p artifacts/atlas-website/dist/public
          cp -r artifacts/atlas-website/dist-production/. artifacts/atlas-website/dist/public/

      - name: Copy public assets to dist
        run: cp -r artifacts/atlas-website/public/. artifacts/atlas-website/dist/public/

      - name: Deploy to Cloudflare Pages
        working-directory: artifacts/atlas-website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: a17938b32e7eb98cc78cc27ee3d42f6d
        run: |
          pnpm add -g wrangler
          wrangler pages deploy dist/public --project-name=atlas-website --branch=main
