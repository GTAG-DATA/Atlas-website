name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: artifacts/atlas-website/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: artifacts/atlas-website
        run: pnpm install

      - name: Build
        working-directory: artifacts/atlas-website
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a17938b32e7eb98cc78cc27ee3d42f6d
          command: pages deploy dist/public --project-name=atlas --branch=main
          workingDirectory: artifacts/atlas-website
